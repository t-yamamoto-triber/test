name: rawデータ自動更新（AFAD + スマートニュース）

on:
  schedule:
    - cron: '0 13 * * *'  # 毎日 22:00 JST（UTC 13:00）※遅延考慮で深夜0〜2時に完了
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Playwright ブラウザキャッシュ
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package.json') }}

      - run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: AFAD → CV_raw 更新
        run: node scripts/upload-afad.mjs
        env:
          AFAD_ID: ${{ secrets.AFAD_ID }}
          AFAD_PASSWORD: ${{ secrets.AFAD_PASSWORD }}
          GAS_URL: ${{ secrets.GAS_URL }}
          CHATWORK_TOKEN: ${{ secrets.CHATWORK_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}

      - name: デバッグ用スクリーンショット保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afad-debug-screenshots
          path: output/downloads/*.png
          if-no-files-found: ignore

      - name: スマートニュース → SN_raw 更新
        run: node scripts/upload-smartnews.mjs
        env:
          SN_AUTH_STATE: ${{ secrets.SN_AUTH_STATE }}
          GAS_URL: ${{ secrets.GAS_URL }}
          CHATWORK_TOKEN: ${{ secrets.CHATWORK_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}

      - name: SNデバッグ用スクリーンショット保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sn-debug-screenshots
          path: output/downloads/sn-*.png
          if-no-files-found: ignore

      - name: 料率入力依頼を Chatwork/Slack に送信
        run: node scripts/notify-input-request.mjs
        env:
          CHATWORK_TOKEN: ${{ secrets.CHATWORK_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
